<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}محمد أحمد رحيل | مطور برمجيات{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="noise-overlay"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-bracket">&lt;</span>
                <span class="logo-name">Mohammed</span>
                <span class="logo-bracket">/&gt;</span>
            </a>
            <ul class="nav-links">
                <li><a href="/#about" class="nav-link">عني</a></li>
                <li><a href="/#skills" class="nav-link">المهارات</a></li>
                <li><a href="/#projects" class="nav-link">المشاريع</a></li>
                <li><a href="/#contact" class="nav-link">تواصل</a></li>
            </ul>
            <button class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="/#about">عني</a>
            <a href="/#skills">المهارات</a>
            <a href="/#projects">المشاريع</a>
            <a href="/#contact">تواصل</a>
        </div>
    </nav>

    <main>{% block content %}{% endblock %}</main>

    <footer class="footer">
        <div class="footer-inner">
            <p class="footer-logo">&lt;Mohammed Rahel /&gt;</p>
            <p class="footer-copy">© 2025 جميع الحقوق محفوظة · مطور بـ ❤️ في ليبيا</p>
            <div class="footer-links">
                <a href="https://github.com/mralmansury-a11y" target="_blank">GitHub</a>
                <a href="mailto:mohammed.ahmed.rahel@gmail.com">Email</a>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
